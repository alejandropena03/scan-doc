<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documento PDF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; color: #1d1d1f;
    }
    .card {
      background: white; border-radius: 20px; padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; max-width: 480px;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    p { color: #6e6e73; margin-bottom: 24px; font-size: 15px; }
    .qr { margin-bottom: 24px; }
    .qr img { width: 240px; height: 240px; border-radius: 12px; }
    .btn {
      display: inline-block; background: #0071e3; color: white;
      padding: 12px 32px; border-radius: 12px; text-decoration: none;
      font-size: 16px; font-weight: 500; transition: background 0.2s;
    }
    .btn:hover { background: #0077ed; }
    .url { margin-top: 16px; font-size: 12px; color: #86868b; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Documento</h1>
    <p>Escanea el QR o haz clic para ver el PDF</p>
    <div class="qr">
      <img src="qr.png" alt="QR Code">
    </div>
    <a class="btn" href="documento.pdf" target="_blank">Abrir PDF</a>
    <div class="url">https://tmpfiles.org/wqw6cuX7DfaT/documento.pdf</div>
  </div>
</body>
</html>
